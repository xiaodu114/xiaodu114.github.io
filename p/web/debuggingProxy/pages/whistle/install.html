    <body>
        <div class="blog-page">
            <h1>Whistle 安装</h1>
            <h2>使用 pnpm 安装</h2>
            <p>这里使用<line-code>pnpm</line-code>安装。更多安装方式，请参考<a href="https://wproxy.org/whistle/install.html" target="_blank">安装 | Whistle</a>。</p>
            <pre ddz-class="here-need-to-handle-by-highlight" ddz-lang="bash">
pnpm add -g whistle
            </pre>
            <p>看下是否安装成功</p>
            <pre ddz-class="here-need-to-handle-by-highlight" ddz-lang="bash">
pnpm ls -g
            </pre>
            <pre ddz-class="here-need-to-handle-by-highlight" ddz-lang="bash">
w2 -V
            </pre>
            <h3>卸载</h3>
            <pre ddz-class="here-need-to-handle-by-highlight" ddz-lang="bash">
pnpm remove -g whistle
            </pre>

                <img src="../../images/whistle/install/1.png" alt="" srcset="">

                <img src="../../images/whistle/install/2.png" alt="" srcset="">

        </div>
